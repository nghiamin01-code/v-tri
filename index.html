<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nút Bấm Phát Âm Thanh</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Thiết kế nút bấm bằng hình ảnh */
        .sound-button {
            background-image: url('https://i.postimg.cc/6qvpwLgG/Anh-chup-man-hinh-2026-06-06-140245.png');
            background-size: cover;
            background-position: center;
            border: none;
            width: 150px; /* Bạn có thể tăng/giảm kích thước tùy ý */
            height: 150px;
            border-radius: 50%; /* Giúp nút tròn nếu ảnh là hình vuông */
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        /* Hiệu ứng khi nhấn giữ nút */
        .sound-button:active {
            transform: scale(0.95);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <button class="sound-button" onclick="playAudio()"></button>

    <audio id="train-audio" src="https://www.myinstants.com/media/sounds/gudok-poezda.mp3"></audio>

    <script>
        function playAudio() {
            var audio = document.getElementById("train-audio");
            
            // Tua về đầu nếu âm thanh đang phát mà người dùng bấm tiếp
            audio.currentTime = 0; 
            
            // Phát âm thanh
            audio.play().catch(function(error) {
                console.log("Trình duyệt chặn tự động phát hoặc có lỗi:", error);
            });
        }
    </script>

</body>
</html>
